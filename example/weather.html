<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Weather Mockup</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <main class="shell">
    <a class="cta" href="./index.html">← Back</a>
    <section class="screen" style="margin-top: 14px;">
      <header class="screen-header">
        <div>
          <h1 class="screen-title">Weather</h1>
          <p class="subtle">Open-Meteo style dashboard</p>
        </div>
        <div class="chiprow">
          <span class="chip">Jyväskylä</span>
          <span class="chip">Updated 15:40</span>
        </div>
      </header>

      <div class="columns-2">
        <article class="weather-card">
          <h3 style="margin:0;color:var(--gold-hi);">Current</h3>
          <p style="font-size:56px;margin:8px 0 0;color:var(--gold-hi);">18°C</p>
          <p class="subtle">Partly cloudy · Feels like 16°C</p>
        </article>

        <article class="weather-card">
          <h3 style="margin:0;color:var(--gold-hi);">Today</h3>
          <p style="font-size:36px;margin:8px 0 0;color:var(--gold);">H 21°C · L 12°C</p>
          <p class="subtle">Wind 12 km/h · Precip 20%</p>
        </article>
      </div>

      <article class="weather-card" style="margin-top:14px;">
        <h3 style="margin:0;color:var(--gold-hi);">Tomorrow</h3>
        <p style="font-size:30px;margin:8px 0 0;color:var(--gold);">☀️ 22°C / 13°C</p>
        <p class="subtle">Mostly sunny, light wind.</p>
      </article>
    </section>
  </main>
</body>
</html>
