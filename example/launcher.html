<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Launcher Mockup</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <main class="shell">
    <a class="cta" href="./index.html">← Back</a>
    <section class="screen" style="margin-top: 14px;">
      <header class="screen-header">
        <div>
          <h1 class="screen-title">KitchenGadget8000</h1>
          <p class="subtle">Mon 6 Jul 2026</p>
        </div>
        <div class="chiprow">
          <span class="chip">15:42</span>
          <span class="chip">📶 Online</span>
          <span class="chip" style="color:#4caf50;border-color:#2d5c2f;">⚡ 92%</span>
        </div>
      </header>

      <div class="launch-grid">
        <div class="launch-card"><div class="app-icon">⏱</div><div>Timers</div></div>
        <div class="launch-card"><div class="app-icon">⇄</div><div>Converter</div></div>
        <div class="launch-card"><div class="app-icon">⚖</div><div>Scaler</div></div>
        <div class="launch-card"><div class="app-icon">🍞</div><div>Hydration</div></div>
        <div class="launch-card"><div class="app-icon">🧊</div><div>Chiller</div></div>
        <div class="launch-card"><div class="app-icon">📖</div><div>Recipes</div></div>
      </div>
    </section>
  </main>
</body>
</html>
