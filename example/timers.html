<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Timers Mockup</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <main class="shell">
    <a class="cta" href="./index.html">← Back</a>
    <section class="screen" style="margin-top: 14px;">
      <header class="screen-header">
        <div>
          <h1 class="screen-title">Kitchen Timers</h1>
          <p class="subtle">Smooth arcs, warning colors, luxury motion</p>
        </div>
        <div class="chiprow">
          <span class="chip">5 min</span>
          <span class="chip">10 min</span>
          <span class="chip">15 min</span>
          <span class="chip">Custom</span>
        </div>
      </header>

      <div class="timer-row">
        <article class="timer">
          <h3>🍝 Pasta</h3>
          <div class="ring" style="--ring:#ffd166;--progress:62%;">
            <div class="time">03:48</div>
          </div>
        </article>

        <article class="timer">
          <h3>🍗 Roast</h3>
          <div class="ring" style="--ring:#80cbc4;--progress:88%;">
            <div class="time">01:12</div>
          </div>
        </article>

        <article class="timer">
          <h3>🥦 Steam</h3>
          <div class="ring" style="--ring:#ffb74d;--progress:94%;">
            <div class="time warn">00:46</div>
          </div>
        </article>

        <article class="timer">
          <h3>🫓 Toast</h3>
          <div class="ring" style="--ring:#ef5350;--progress:97%;">
            <div class="time critical">00:18</div>
          </div>
        </article>

        <article class="timer">
          <h3>☕ Brew</h3>
          <div class="ring" style="--ring:#ffd166;--progress:100%;">
            <div class="time critical">Done</div>
          </div>
        </article>
      </div>
    </section>
  </main>
</body>
</html>
